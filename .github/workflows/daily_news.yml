name: Automated Daily Tech News

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: "30 00 * * *"
  workflow_dispatch: {}   # allows manual runs from the Actions tab

# Required so the workflow can commit and push NEWS.md back to the repo.
permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run news fetcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- NEWS.md; then
            echo "No changes to NEWS.md — nothing to commit."
            exit 0
          fi

          git add NEWS.md
          git commit -m "chore: update daily tech news [automated]"

          # Retry push in case of a race with another concurrent run
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
